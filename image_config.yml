# Defaults for static-image generation across this repo.
#
# Vocabulary used here is mirrored in every sketch's CLI flags:
#   width_inches / height_inches / dpi   (YAML keys)
#   --width-inches / --height-inches / --dpi   (CLI flags)
#
# Pixel size is width_inches * dpi by height_inches * dpi.

dpi: 300

# Default canvas for sketches whose shape is "square".
square:
  width_inches: 16
  height_inches: 16

# Convention for rectangular sketches: pick width_inches and height_inches
# whose product equals this number so square and rectangular prints take
# the same wall space (16 * 16 = 256).
rectangular:
  target_square_inches: 256

# Per-sketch overrides. Sketches without an entry inherit `square` defaults.
# To customize a single sketch, set any of: shape, width_inches,
# height_inches, dpi. width_inches and height_inches always win over `shape`.
sketches:
  clifford_attractor_basic: { shape: square }
  grainy_sorta_spirograph:  { shape: square }
  physarum:                 { shape: square }
  fbm_fields:               { shape: square }
  # Example of a custom rectangle (32 * 8 = 256 in^2, matches the convention):
  # my_panorama_sketch:
  #   width_inches: 32
  #   height_inches: 8
  #   dpi: 300
