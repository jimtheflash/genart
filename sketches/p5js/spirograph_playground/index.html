<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spirograph Playground</title>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script defer src="./sketch.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="canvas-pane" aria-label="Drawing surface">
        <header class="topbar">
          <h1>Spirograph Playground</h1>
        </header>
        <div class="canvas-stage">
          <div id="canvasMount" aria-label="Animated spirograph drawing"></div>
          <div class="fullscreen-toolbar" aria-label="Fullscreen quick controls">
            <button id="fullscreenExitBtn" type="button">Exit Fullscreen</button>
          </div>
        </div>

        <div class="mobile-toolbar" aria-label="Quick controls">
          <button id="mobileRandomBtn" type="button">New</button>
          <button id="mobilePlayPauseBtn" type="button">Pause</button>
          <button id="mobileFullscreenBtn" type="button">Fullscreen</button>
        </div>

        <button
          id="controlsToggleBtn"
          class="controls-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="controlsPane"
        >
          Show controls
        </button>
      </section>

      <aside id="controlsPane" class="controls-pane" aria-label="Controls">
        <section class="control-section">
          <div class="field">
            <label for="modeSelect">Mode</label>
            <select id="modeSelect">
              <option value="classic">Classic</option>
              <option value="epicycle">Epicycle</option>
            </select>
          </div>

          <div id="shapeControls" class="shape-controls" aria-label="Classic spirograph pieces">
            <div class="shape-group">
              <div class="shape-group-label">Outer piece</div>
              <div class="icon-row" id="fixedVariantRow" role="radiogroup" aria-label="Outer piece variant">
                <button type="button" class="icon-btn" data-variant="hypotrochoid" aria-label="Ring (hypotrochoid)" title="Ring">
                  <svg viewBox="0 0 40 40" aria-hidden="true">
                    <circle cx="20" cy="20" r="16" fill="none" stroke="currentColor" stroke-width="2.5" />
                    <circle cx="20" cy="20" r="9" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.5" />
                  </svg>
                  <span>Ring</span>
                </button>
                <button type="button" class="icon-btn" data-variant="epitrochoid" aria-label="Outer gear (epitrochoid)" title="Outer gear">
                  <svg viewBox="0 0 40 40" aria-hidden="true">
                    <g fill="currentColor">
                      <circle cx="20" cy="20" r="11" fill="none" stroke="currentColor" stroke-width="2" />
                      <rect x="19" y="2" width="2" height="4" />
                      <rect x="19" y="34" width="2" height="4" />
                      <rect x="2" y="19" width="4" height="2" />
                      <rect x="34" y="19" width="4" height="2" />
                      <rect x="6.5" y="6.5" width="3" height="2" transform="rotate(45 8 7.5)" />
                      <rect x="30.5" y="6.5" width="3" height="2" transform="rotate(-45 32 7.5)" />
                      <rect x="6.5" y="31.5" width="3" height="2" transform="rotate(-45 8 32.5)" />
                      <rect x="30.5" y="31.5" width="3" height="2" transform="rotate(45 32 32.5)" />
                    </g>
                  </svg>
                  <span>Gear</span>
                </button>
              </div>
              <div class="size-row" id="fixedSizeRow" role="radiogroup" aria-label="Outer piece size"></div>
            </div>

            <div class="shape-group">
              <div class="shape-group-label">Inner wheel</div>
              <div class="wheel-icon-wrap">
                <svg id="wheelIcon" viewBox="-50 -50 100 100" aria-label="Wheel with pen-hole positions">
                  <circle cx="0" cy="0" r="32" fill="none" stroke="currentColor" stroke-width="2.5" />
                  <g id="penHoleDots"></g>
                </svg>
              </div>
              <div class="size-row" id="wheelSizeRow" role="radiogroup" aria-label="Inner wheel size"></div>
            </div>
          </div>

          <div id="epicycleControls" class="epicycle-controls" hidden aria-label="Epicycle parameters">
            <div class="field">
              <div class="label-row">
                <label for="epiSymmetryRange">Symmetry</label>
                <span id="epiSymmetryValue">4</span>
              </div>
              <input id="epiSymmetryRange" type="range" min="3" max="9" step="1" value="4" />
            </div>
            <div class="field">
              <div class="label-row">
                <label for="epiWobbleAmountRange">Wobble amount</label>
                <span id="epiWobbleAmountValue">0.05</span>
              </div>
              <input id="epiWobbleAmountRange" type="range" min="0" max="0.20" step="0.01" value="0.05" />
            </div>
            <div class="field">
              <div class="label-row">
                <label for="epiWobbleFreqRange">Wobble frequency</label>
                <span id="epiWobbleFreqValue">3</span>
              </div>
              <input id="epiWobbleFreqRange" type="range" min="0.5" max="8" step="0.1" value="3" />
            </div>
            <div class="field">
              <div class="label-row">
                <label for="epiRotationDriftRange">Rotation drift (×π)</label>
                <span id="epiRotationDriftValue">0</span>
              </div>
              <input id="epiRotationDriftRange" type="range" min="-10" max="10" step="0.1" value="0" />
            </div>
          </div>

          <div class="color-pickers">
            <div class="field">
              <label for="bgColorInput">Background</label>
              <input id="bgColorInput" type="color" value="#ffffff" />
            </div>
            <div class="field">
              <label for="fgColorInput">Line color</label>
              <input id="fgColorInput" type="color" value="#000000" />
            </div>
          </div>

          <div class="button-grid">
            <button id="randomizeBtn" type="button">New</button>
            <button id="restartBtn" type="button">Restart</button>
            <button id="playPauseBtn" type="button">Pause</button>
            <button id="jumpEndBtn" type="button">End</button>
            <button id="fullscreenBtn" type="button">Fullscreen</button>
          </div>
        </section>

        <section class="control-section">
          <div class="field">
            <div class="label-row">
              <label for="speedRange">Speed</label>
              <span id="speedValue">1</span>
            </div>
            <input id="speedRange" type="range" min="0.01" max="1" step="0.01" value="1" autocomplete="off" />
          </div>

          <div class="field">
            <div class="label-row">
              <label for="progressRange">Progress</label>
              <span id="progressValue">0%</span>
            </div>
            <input id="progressRange" type="range" min="0" max="1" value="0" />
          </div>
        </section>

        <section class="control-section">
          <button id="savePreviewBtn" type="button">Save Preview</button>

          <details id="recipeDetails" class="recipe-details">
            <summary>Recipe</summary>
            <div class="recipe-body">
              <div class="button-grid">
                <button id="copyRecipeBtn" type="button">Copy</button>
                <button id="saveRecipeBtn" type="button">Save</button>
                <button id="loadRecipeBtn" type="button">Load</button>
              </div>
              <textarea id="recipeBox" spellcheck="false"></textarea>
            </div>
          </details>
        </section>
      </aside>
    </main>
  </body>
</html>
